<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Rural - Portal El Progreso</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="estilos.css">

    <style>
        :root {
            --p-color: #7b2cbf;
            --bg-chat: #15151d;
            --bg-body: #0d0d12;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-body);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .chat-container {
            max-width: 750px;
            margin: 30px auto;
            background: var(--bg-chat);
            border: 1px solid #3a1c5c;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            height: 85vh;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            text-align: center;
            background: #1a1a24;
            border-bottom: 2px solid var(--p-color);
        }

        .chat-header h3 {
            margin: 0; color: #c77dff; letter-spacing: 1px; font-size: 1.2rem;
        }

        .chat-body {
            flex: 1; padding: 25px; overflow-y: auto; display: flex;
            flex-direction: column; gap: 18px; scroll-behavior: smooth;
            background-image: radial-gradient(circle at center, #1a1a24 0%, #15151d 100%);
        }

        .msg {
            max-width: 85%; padding: 14px 18px; border-radius: 18px;
            line-height: 1.6; font-size: 15px; animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ia {
            background: #252533; align-self: flex-start;
            border-radius: 18px 18px 18px 0; border: 1px solid #2a2a3a; color: #e0e0e0;
        }

        .user {
            background: var(--p-color); align-self: flex-end;
            border-radius: 18px 18px 0 18px; color: white;
            box-shadow: 0 4px 15px rgba(123, 44, 191, 0.3);
        }

        .ia p { margin: 8px 0; }
        .ia ul, .ia ol { padding-left: 25px; }
        .ia strong { color: #c77dff; }

        .footer {
            padding: 20px; background: #1a1a24; display: flex; gap: 12px;
            border-top: 1px solid #2a2a3a;
        }

        .input-wrapper {
            flex: 1; background: #0d0d12; border: 1px solid #3a1c5c;
            border-radius: 12px; padding: 5px 15px;
        }

        input {
            width: 100%; background: transparent; border: none;
            color: white; outline: none; padding: 12px 0; font-size: 15px;
        }

        button {
            background: var(--p-color); color: white; border: none;
            padding: 10px 25px; border-radius: 10px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }

        button:hover { background: #9d4edd; transform: translateY(-2px); }

        .status {
            font-size: 11px; color: #888; text-align: center;
            padding: 8px; font-style: italic;
        }

        @media (max-width: 768px) {
            .chat-container { margin: 12px; height: calc(100vh - 24px); }
            .footer { padding: 14px; }
            button { padding: 10px 18px; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h3>🤖 ASISTENTE RURAL INTELIGENTE</h3>
    </div>

    <div class="chat-body" id="chat-body">
        <div class="msg ia">
            ¡Conexión establecida con éxito en Spark! Soy el experto del Portal Rural El Progreso. ¿En qué puedo asesorarte hoy?
        </div>
    </div>

    <div id="status" class="status">Sistema listo</div>

    <form class="footer" id="chat-form">
        <div class="input-wrapper">
            <input type="text" id="chat-input" placeholder="Pregunta sobre cultivos, ganado o abonos..." required autocomplete="off">
        </div>
        <button type="submit">Enviar</button>
    </form>
</div>

<script type="module">
    // USAMOS EL SDK GRATUITO (COMPATIBLE CON SPARK) EN LUGAR DE VERTEX AI
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // Tu llave de AI Studio (la que no exige facturación)
    const API_KEY = "AIzaSyBkhqOd5fJKUbE6Dx4kvhZR2Hj9jikRykw";
    const genAI = new GoogleGenerativeAI(API_KEY);

    // Configuración estricta del modelo 2.5 pedido por el profesor
    const model = genAI.getGenerativeModel({
        model: "gemini-2.5-flash",
        systemInstruction: `
Eres el experto del Portal Rural El Progreso.
Tu misión es asesorar a campesinos de forma técnica, clara y sencilla.
Responde en español.
Usa lenguaje fácil de entender.
Usa negritas para resaltar ideas clave.
Si te preguntan algo fuera del tema rural, igual responde de forma útil y amable.
        `.trim()
    });

    const chatSession = model.startChat();

    const form = document.getElementById("chat-form");
    const input = document.getElementById("chat-input");
    const body = document.getElementById("chat-body");
    const status = document.getElementById("status");

    function agregarBurbuja(texto, tipo) {
        const div = document.createElement("div");
        div.className = `msg ${tipo}`;

        if (tipo === "ia") {
            div.innerHTML = marked.parse(texto);
        } else {
            div.textContent = texto;
        }

        body.appendChild(div);
        body.scrollTop = body.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const prompt = input.value.trim();
        if (!prompt) return;

        agregarBurbuja(prompt, "user");
        input.value = "";
        status.innerText = "La IA está pensando...";

        try {
            const result = await chatSession.sendMessage(prompt);
            const response = await result.response;
            const textoIA = response.text() || "No se recibió una respuesta válida del modelo.";

            agregarBurbuja(textoIA, "ia");
            status.innerText = "Sistema listo";
        } catch (error) {
            console.error("Detalle técnico:", error);
            status.innerText = "Error detectado";

            const mensajeError = String(error?.message || error);
            let errorMsg = "Lo siento, ocurrió un error al consultar la IA.";

            if (mensajeError.includes("404")) {
                errorMsg = "Error 404: El modelo gemini-2.5-flash no fue encontrado en la versión gratuita. Habla con tu profesor sobre esto.";
            } else if (mensajeError.includes("403")) {
                errorMsg = "Error 403: La API Key aún no tiene los permisos correctos en Google Cloud.";
            }

            agregarBurbuja(errorMsg, "ia");
        }
    });
</script>

</body>
</html>
