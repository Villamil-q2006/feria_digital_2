<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Portal Rural El Progreso</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<header>
  <h1>Portal Rural El Progreso</h1>
  <p>Producción agrícola, ganadera y talleres rurales</p>
</header>

<section id="login">
  <h2>Inicio de Sesión / Registro</h2>
  <form id="loginForm">
    <label>Correo electrónico</label>
    <input type="email" id="email" required>

    <label>Contraseña</label>
    <input type="password" id="password" required>

    <button type="submit">Ingresar</button>
    <p id="loginMessage"></p>
  </form>
</section>

<main id="contenido" style="display:none;">
  <!-- Aquí va tu contenido principal -->
</main>

<footer>
  <p>Portal Rural El Progreso - Comunidad campesina</p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAwcDaYFEdMX9QpJMoKA1pBGJog3_uM6e4",
    authDomain: "correos-de-verificacion.firebaseapp.com",
    projectId: "correos-de-verificacion",
    storageBucket: "correos-de-verificacion.firebasestorage.app",
    messagingSenderId: "395918603660",
    appId: "1:395918603660:web:7183abd472984f060012a9",
    measurementId: "G-QQ6KTDYPDF"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const loginForm = document.getElementById("loginForm");
  const loginMessage = document.getElementById("loginMessage");
  const contenido = document.getElementById("contenido");

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      // Registrar usuario
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // Enviar correo de verificación
      await sendEmailVerification(user);
      loginMessage.textContent = "Se envió un correo de verificación. Revisa tu bandeja.";

    } catch (error) {
      // Si ya existe, intentar iniciar sesión
      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        if (user.emailVerified) {
          loginMessage.textContent = "Acceso concedido.";
          contenido.style.display = "block";
        } else {
          loginMessage.textContent = "Debes verificar tu correo antes de entrar.";
        }
      } catch (err) {
        loginMessage.textContent = "Error: " + err.message;
      }
    }
  });
</script>
</body>
</html>
